name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          script: |
            cd /root/cyt || { echo "❌ Folder not found"; exit 1; }
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Gcsaini0215/cyt.git
            git fetch origin main
            git reset --hard origin/main
            git remote set-url origin https://github.com/Gcsaini0215/cyt.git
            npm ci
            npm run build
            rm -rf .next/cache
            pm2 reload cyt-frontend --update-env
            pm2 save
            sleep 3
            pm2 status
