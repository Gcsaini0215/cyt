name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Remove build cache (optional)
        run: rm -rf .next/cache

      - name: Copy code to VPS
        uses: appleboy/scp-action@v0.1.7 
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          # Source directory content complete copy with correct globs
          source: ".next/**,public/**,package.json,package-lock.json,next.config.js,.env"
          target: "/root/cyt"
          strip_components: 0
          overwrite: true
          debug: true

      - name: Restart frontend on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          script: |
            cd /root/cyt || { echo "❌ Folder not found"; exit 1; }
            npm ci --production
            pm2 reload cyt-frontend --update-env
            pm2 save
            sleep 3
            pm2 status
